name: Python CI

on:
  push:
    branches: [main] # Запускається при push до гілки main

jobs:
  build:
    runs-on: ubuntu-latest # Використовує runner (віртуальну машину)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3 # Клонування репозиторію

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest # Встановлює залежності

      - name: Run tests
        run: pytest # Запускає тести
